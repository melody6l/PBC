<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件核对工具</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1><span class="icon">&#128270;</span> 文件核对工具</h1>

        <!-- 操作面板 -->
        <div class="action-row">
            <!-- 清单上传 -->
            <div class="panel">
                <div class="panel-title">
                    &#128196; 需求文件清单
                    <span class="badge" id="checklist-badge">未加载</span>
                </div>
                <div class="upload-area" id="upload-area">
                    <div class="upload-icon">&#128193;</div>
                    <p>点击或拖拽上传Excel清单文件 (.xlsx)</p>
                </div>
                <input type="file" id="checklist-input" accept=".xlsx" class="hidden">
            </div>

            <!-- 目标文件夹 -->
            <div class="panel">
                <div class="panel-title">
                    &#128194; 客户资料文件夹
                    <span class="badge" id="folder-badge">未扫描</span>
                </div>
                <div class="folder-input-group">
                    <input type="text" id="folder-path" placeholder="请输入文件夹路径，如: D:\客户资料\2024年度">
                    <button class="btn btn-primary" id="scan-btn">&#128270; 扫描</button>
                </div>
                <div id="scan-info" class="preview-info hidden"></div>
            </div>
        </div>

        <!-- 匹配控制 + 统计 -->
        <div class="panel" id="control-panel">
            <div class="panel-title">&#9881; 匹配控制</div>
            <div class="mode-selector">
                <label>匹配模式:</label>
                <select id="match-mode">
                    <option value="fuzzy">模糊匹配（关键词包含）</option>
                    <option value="exact">精确匹配（文件名完全一致）</option>
                </select>
                <button class="btn btn-success" id="match-btn">&#10003; 执行匹配</button>
            </div>
            <!-- 名称列选择（上传后显示） -->
            <div class="name-col-selector hidden" id="name-col-selector">
                <label>文件名称列:</label>
                <select id="name-col-select"></select>
                <span class="hint" id="name-col-hint"></span>
            </div>
            <!-- 列显示控制 -->
            <div class="col-toggle-panel" id="col-toggle-panel">
                <button class="btn btn-outline btn-sm" id="col-toggle-btn">&#128065; 显示列</button>
                <div class="col-toggle-dropdown hidden" id="col-toggle-dropdown"></div>
            </div>
            <div class="progress-bar">
                <div class="fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="stats hidden" id="stats-section">
                <div class="stat-card total">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">清单总数</div>
                </div>
                <div class="stat-card matched">
                    <div class="stat-value" id="stat-matched">0</div>
                    <div class="stat-label">已获取</div>
                </div>
                <div class="stat-card missing">
                    <div class="stat-value" id="stat-missing">0</div>
                    <div class="stat-label">未获取</div>
                </div>
            </div>
        </div>

        <!-- 分屏：左侧清单表格 + 右侧文件树 -->
        <div class="split-view hidden" id="split-view">
            <!-- 左侧：核对清单 -->
            <div class="panel" id="main-table-section">
                <div class="panel-title">
                    &#128203; 文件核对清单
                </div>
                <div class="btn-group">
                    <button class="btn btn-success hidden" id="export-btn">&#128190; 导出Excel</button>
                    <button class="btn btn-outline" id="toggle-tree-btn">&#128194; 显示资料</button>
                </div>
                <!-- 状态筛选栏 -->
                <div class="status-filter-bar hidden" id="status-filter-bar">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="yes">&#10003; 已获取</button>
                    <button class="filter-btn" data-filter="no">&#10007; 未获取</button>
                </div>
                <div class="result-table-wrapper" id="result-table-wrapper">
                    <table class="result-table" id="main-table">
                        <thead id="main-table-head"></thead>
                        <tbody id="main-table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- 右侧：文件树浏览器 -->
            <div class="file-tree-panel" id="file-tree-panel">
                <div class="panel-title">
                    &#128193; 资料浏览
                    <button class="tree-close-btn" id="tree-close-btn" title="收起">&#10005;</button>
                </div>
                <div class="file-tree" id="file-tree"></div>
            </div>
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">&#128194;</div>
            <p>请先上传需求文件清单，再扫描客户资料文件夹</p>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script src="/static/js/main.js"></script>
</body>
</html>
